<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지끼니 16:9 템플릿 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Gowun Dodum', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #EDE8DC;
    color: #3D342B;
    padding: 20px;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #3D342B;
  }

  .subtitle {
    font-size: 12px;
    color: #7A6F5C;
    margin-bottom: 24px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 1024px) {
    .layout {
      grid-template-columns: 380px 1fr;
    }
  }

  /* === 입력 패널 === */
  .input-panel {
    background: #F5F1E8;
    border-radius: 12px;
    padding: 20px;
    border: 0.5px solid #A89B82;
  }

  .input-panel h2 {
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #3D342B;
    letter-spacing: 1px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: #7A6F5C;
    margin-bottom: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 8px 10px;
    border: 0.5px solid #A89B82;
    border-radius: 4px;
    background: #FAF7EF;
    font-family: inherit;
    font-size: 13px;
    color: #3D342B;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    outline: none;
    border-color: #5C5247;
    background: #FFFCF5;
  }

  .field textarea {
    resize: vertical;
    min-height: 50px;
  }

  .ingredient-row {
    display: grid;
    grid-template-columns: 1fr 80px 28px;
    gap: 6px;
    margin-bottom: 6px;
  }

  .ingredient-row input {
    padding: 6px 8px;
    font-size: 12px;
  }

  .ingredient-row button {
    background: transparent;
    border: 0.5px solid #A89B82;
    border-radius: 4px;
    color: #7A6F5C;
    cursor: pointer;
    font-size: 14px;
    padding: 0;
  }

  .ingredient-row button:hover {
    background: #E8DFC9;
    color: #3D342B;
  }

  .add-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 0.5px dashed #A89B82;
    border-radius: 4px;
    color: #7A6F5C;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    margin-top: 4px;
  }

  .add-btn:hover {
    background: #E8DFC9;
    color: #3D342B;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .download-btn {
    width: 100%;
    padding: 12px;
    background: #3D342B;
    border: none;
    border-radius: 6px;
    color: #F5F1E8;
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .download-btn:hover {
    background: #2C2620;
  }

  .download-btn:active {
    transform: scale(0.98);
  }

  .divider {
    height: 0.5px;
    background: #A89B82;
    margin: 16px 0;
  }

  /* === 미리보기 패널 === */
  .preview-panel {
    background: #F5F1E8;
    border-radius: 12px;
    padding: 20px;
    border: 0.5px solid #A89B82;
  }

  .preview-panel h2 {
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #3D342B;
    letter-spacing: 1px;
  }

  .preview-wrap {
    width: 100%;
    overflow: auto;
    background: #2C2C2A;
    border-radius: 8px;
    padding: 16px;
  }

  /* 캔버스 그대로 미리보기 - 16:9 비율로 축소 표시 */
  #preview-canvas {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
    background: #F5F1E8;
    border-radius: 4px;
  }

  .info {
    font-size: 11px;
    color: #7A6F5C;
    margin-top: 10px;
    line-height: 1.6;
  }

  .info strong {
    color: #3D342B;
  }
</style>
</head>
<body>

<div class="container">
  <h1>지끼니 가로 템플릿 생성기</h1>
  <p class="subtitle">1920 × 1080 (16:9) · 롱폼용 사이드 패널</p>

  <div class="layout">
    <!-- 입력 영역 -->
    <div class="input-panel">
      <h2>내용 입력</h2>

      <div class="field">
        <label>회차 (예: EP. 002)</label>
        <input type="text" id="episode" value="EP. 002" maxlength="20">
      </div>

      <div class="field">
        <label>요리명</label>
        <input type="text" id="title" value="500원짜리 포카치아" maxlength="30">
      </div>

      <div class="field">
        <label>한줄 카피</label>
        <textarea id="copy" maxlength="80">오븐 없이, 밀가루 한 봉으로 사흘치 빵.</textarea>
      </div>

      <div class="divider"></div>

      <h2>재료</h2>
      <div id="ingredients-list">
        <!-- JS로 생성 -->
      </div>
      <button class="add-btn" onclick="addIngredient()">+ 재료 추가</button>

      <div class="divider"></div>

      <h2>비용</h2>
      <div class="field-row">
        <div class="field">
          <label>총 비용</label>
          <input type="text" id="total-cost" value="1,520원">
        </div>
        <div class="field">
          <label>1인분</label>
          <input type="text" id="per-serving" value="510원">
        </div>
      </div>

      <div class="divider"></div>

      <h2>채널 정보</h2>
      <div class="field">
        <label>채널명</label>
        <input type="text" id="channel-name" value="먹는 게 남는 거라서">
      </div>
      <div class="field">
        <label>핸들</label>
        <input type="text" id="handle" value="@지끼니">
      </div>

      <div class="divider"></div>

      <h2>폰트 선택</h2>
      <div class="field">
        <label>요리명 폰트</label>
        <select id="title-font">
          <option value="'Gowun Batang', serif">고운바탕 (단정)</option>
          <option value="'Nanum Myeongjo', serif">나눔명조 (전통)</option>
          <option value="'Noto Serif KR', serif">노토세리프 (모던)</option>
          <option value="'Gaegu', cursive">개구 (손글씨, 강함)</option>
          <option value="'Gowun Dodum', sans-serif">고운도담 (산세리프)</option>
        </select>
      </div>

      <div class="divider"></div>

      <button class="download-btn" onclick="downloadPNG()">PNG 다운로드 (1920×1080)</button>

      <p class="info" style="margin-top: 12px;">
        <strong>사용 방법</strong><br>
        1. 위에 내용 입력<br>
        2. 다운로드 버튼 클릭<br>
        3. CapCut/Premiere에서 배경으로 깔고<br>
        　우측 영상 자리에 세로 영상 얹기
      </p>
    </div>

    <!-- 미리보기 영역 -->
    <div class="preview-panel">
      <h2>미리보기</h2>
      <div class="preview-wrap">
        <canvas id="preview-canvas" width="1920" height="1080"></canvas>
      </div>
      <p class="info">
        <strong>영상 자리:</strong> 우측에 검은 영역 (해상도: 약 580 × 1031px, 9:16 비율)<br>
        <strong>다운로드:</strong> 영상 영역은 <strong>투명</strong>으로 처리되어, 편집 프로그램에서 영상을 그 자리에 정확히 배치할 수 있어요
      </p>
    </div>
  </div>
</div>

<script>
  // === 기본 재료 데이터 ===
  let ingredients = [
    { name: '강력분', amount: '200g' },
    { name: '드라이이스트', amount: '2g' },
    { name: '소금', amount: '3g' },
    { name: '올리브유', amount: '15ml' },
    { name: '물', amount: '140ml' },
    { name: '로즈마리', amount: '한 줄기' }
  ];

  // === 재료 입력 UI 렌더링 ===
  function renderIngredients() {
    const list = document.getElementById('ingredients-list');
    list.innerHTML = '';
    ingredients.forEach((ing, i) => {
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.innerHTML = `
        <input type="text" placeholder="재료명" value="${ing.name}" oninput="updateIngredient(${i}, 'name', this.value)">
        <input type="text" placeholder="양" value="${ing.amount}" oninput="updateIngredient(${i}, 'amount', this.value)">
        <button onclick="removeIngredient(${i})" title="삭제">×</button>
      `;
      list.appendChild(row);
    });
  }

  function updateIngredient(i, key, value) {
    ingredients[i][key] = value;
    drawCanvas();
  }

  function addIngredient() {
    if (ingredients.length >= 8) {
      alert('재료는 최대 8개까지 입력 가능해요. (공간 제약)');
      return;
    }
    ingredients.push({ name: '', amount: '' });
    renderIngredients();
    drawCanvas();
  }

  function removeIngredient(i) {
    ingredients.splice(i, 1);
    renderIngredients();
    drawCanvas();
  }

  // === Canvas 렌더링 ===
  function drawCanvas() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const W = 1920;
    const H = 1080;

    // 배경 (크림 컬러)
    ctx.fillStyle = '#F5F1E8';
    ctx.fillRect(0, 0, W, H);

    // 좌측 패널 영역 (영상은 우측에 자리)
    // 좌측 패널: 0 ~ 1130px (약 59%)
    // 우측 영상 자리: 1180 ~ 1762px (약 580px 너비, 9:16 영상)
    const PANEL_X = 140;       // 좌측 여백
    const PANEL_W = 950;       // 패널 내부 너비

    // === 회차 (EP. 002) ===
    const episode = document.getElementById('episode').value || 'EP. 001';
    ctx.fillStyle = '#7A6F5C';
    ctx.font = '700 32px "Gowun Dodum", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    // 자간 효과 (수동)
    drawSpacedText(ctx, episode.toUpperCase(), PANEL_X, 180, 4);

    // === 요리명 ===
    const title = document.getElementById('title').value || '요리명';
    const titleFont = document.getElementById('title-font').value;
    ctx.fillStyle = '#3D342B';
    ctx.font = `500 88px ${titleFont}`;
    ctx.textBaseline = 'top';

    // 요리명 자동 줄바꿈 (글자 수 기준 - 한글 8자 정도)
    const titleLines = wrapTextByLength(title, 12);
    let titleY = 240;
    titleLines.forEach(line => {
      ctx.fillText(line, PANEL_X, titleY);
      titleY += 100;
    });

    // === 짧은 구분선 ===
    const lineY = titleY + 30;
    ctx.strokeStyle = '#A89B82';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PANEL_X, lineY);
    ctx.lineTo(PANEL_X + 120, lineY);
    ctx.stroke();

    // === 한줄 카피 ===
    const copy = document.getElementById('copy').value || '';
    ctx.fillStyle = '#5C5247';
    ctx.font = 'italic 400 32px "Gowun Dodum", sans-serif';
    const copyLines = wrapTextByLength(copy, 22);
    let copyY = lineY + 40;
    copyLines.forEach(line => {
      ctx.fillText(line, PANEL_X, copyY);
      copyY += 44;
    });

    // === 재료 섹션 ===
    const ingredientsStartY = 600;

    ctx.fillStyle = '#7A6F5C';
    ctx.font = '700 28px "Gowun Dodum", sans-serif';
    drawSpacedText(ctx, '재료', PANEL_X, ingredientsStartY, 4);

    // 재료 리스트 (2단 배치)
    ctx.font = '400 30px "Gowun Dodum", sans-serif';
    ctx.textBaseline = 'top';

    const colWidth = (PANEL_W) / 2;
    const rowHeight = 50;

    ingredients.forEach((ing, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = PANEL_X + col * colWidth;
      const y = ingredientsStartY + 60 + row * rowHeight;

      // 재료명
      ctx.fillStyle = '#3D342B';
      ctx.textAlign = 'left';
      ctx.fillText(ing.name, x, y);

      // 양 (오른쪽 정렬)
      ctx.fillStyle = '#7A6F5C';
      ctx.textAlign = 'right';
      ctx.fillText(ing.amount, x + colWidth - 60, y);
    });

    // === 비용 + 채널 정보 (하단) ===
    const bottomY = 920;

    // 구분선
    ctx.strokeStyle = '#A89B82';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PANEL_X, bottomY - 30);
    ctx.lineTo(PANEL_X + PANEL_W - 60, bottomY - 30);
    ctx.stroke();

    // 비용
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#7A6F5C';
    ctx.font = '400 26px "Gowun Dodum", sans-serif';
    ctx.fillText('총 비용', PANEL_X, bottomY);

    ctx.fillStyle = '#3D342B';
    ctx.font = '700 32px "Gowun Dodum", sans-serif';
    ctx.fillText(document.getElementById('total-cost').value, PANEL_X + 140, bottomY - 4);

    ctx.fillStyle = '#7A6F5C';
    ctx.font = '400 26px "Gowun Dodum", sans-serif';
    ctx.fillText('1인분', PANEL_X + 380, bottomY);

    ctx.fillStyle = '#3D342B';
    ctx.font = '700 32px "Gowun Dodum", sans-serif';
    ctx.fillText(document.getElementById('per-serving').value, PANEL_X + 490, bottomY - 4);

    // 채널 정보 (맨 아래)
    ctx.fillStyle = '#3D342B';
    ctx.font = '700 26px "Gowun Dodum", sans-serif';
    ctx.fillText(document.getElementById('channel-name').value, PANEL_X, bottomY + 60);

    ctx.fillStyle = '#7A6F5C';
    ctx.font = '400 24px "Gowun Dodum", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(document.getElementById('handle').value, PANEL_X + PANEL_W - 60, bottomY + 62);

    // === 우측 영상 자리 표시 (미리보기에서만 보임) ===
    // 9:16 비율, 높이를 1031px(약 95%)로 잡고 너비 계산
    const VIDEO_H = 1031;
    const VIDEO_W = VIDEO_H * 9 / 16; // 약 580px
    const VIDEO_X = W - VIDEO_W - 158; // 우측 여백 158px
    const VIDEO_Y = (H - VIDEO_H) / 2;

    // 미리보기용 어두운 박스
    ctx.fillStyle = '#2C2C2A';
    ctx.fillRect(VIDEO_X, VIDEO_Y, VIDEO_W, VIDEO_H);

    ctx.fillStyle = '#888780';
    ctx.font = '400 28px "Gowun Dodum", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('[ 세로 영상 자리 ]', VIDEO_X + VIDEO_W / 2, VIDEO_Y + VIDEO_H / 2 - 40);
    ctx.font = '400 22px "Gowun Dodum", sans-serif';
    ctx.fillStyle = '#5F5E5A';
    ctx.fillText('9 : 16  (다운로드 시 투명)', VIDEO_X + VIDEO_W / 2, VIDEO_Y + VIDEO_H / 2);
  }

  // 자간 있는 텍스트 그리기
  function drawSpacedText(ctx, text, x, y, spacing) {
    let currentX = x;
    for (let char of text) {
      ctx.fillText(char, currentX, y);
      currentX += ctx.measureText(char).width + spacing;
    }
  }

  // 글자 수 기준 줄바꿈
  function wrapTextByLength(text, maxLen) {
    if (!text) return [''];
    if (text.length <= maxLen) return [text];

    const lines = [];
    let current = '';
    const words = text.split(' ');

    for (let word of words) {
      if ((current + word).length <= maxLen) {
        current += (current ? ' ' : '') + word;
      } else {
        if (current) lines.push(current);
        current = word;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // === PNG 다운로드 ===
  function downloadPNG() {
    // 다운로드용 캔버스를 새로 만들고, 영상 영역은 투명으로
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = 1920;
    exportCanvas.height = 1080;
    const exportCtx = exportCanvas.getContext('2d');

    // 미리보기 캔버스 내용을 복사
    const previewCanvas = document.getElementById('preview-canvas');
    exportCtx.drawImage(previewCanvas, 0, 0);

    // 영상 영역만 투명으로 잘라내기
    const VIDEO_H = 1031;
    const VIDEO_W = VIDEO_H * 9 / 16;
    const VIDEO_X = 1920 - VIDEO_W - 158;
    const VIDEO_Y = (1080 - VIDEO_H) / 2;

    exportCtx.clearRect(VIDEO_X, VIDEO_Y, VIDEO_W, VIDEO_H);

    // 다운로드
    const title = document.getElementById('title').value.replace(/\s+/g, '_') || 'jikkini';
    const link = document.createElement('a');
    link.download = `jikkini_${title}_1920x1080.png`;
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
  }

  // === 입력 변경 시 자동 미리보기 갱신 ===
  document.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('input', drawCanvas);
    el.addEventListener('change', drawCanvas);
  });

  // === 폰트 로드 후 초기 그리기 ===
  document.fonts.ready.then(() => {
    renderIngredients();
    drawCanvas();
  });

  // 폰트 로드 전에도 일단 한 번 그리기
  renderIngredients();
  drawCanvas();
</script>

</body>
</html>
